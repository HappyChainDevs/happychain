name: Deploy staging react demo

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Copy files to server (via /tmp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "demos/react/dist"
          target: /tmp/demo-react-upload
          strip_components: 3
          rm: true

      - name: Deploy staging react demo to server
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            chmod -R o+rX /tmp/demo-react-upload
            sudo -u staging_demo_react bash -c '
              rm -rf /var/www/staging-demo-react/*
              cp -r /tmp/demo-react-upload/* /var/www/staging-demo-react
            '
            rm -rf /tmp/demo-react-upload